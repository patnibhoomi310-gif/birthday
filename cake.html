<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday ❤️</title>

    <link rel="stylesheet" href="CAKE.CSS">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">
</head>

<body class="cake-page">
    
<source src="02 - Thodi Der (1).mp3"
type="audio/mp3">

    <!-- Fairy Lights -->
    <div class="lights"></div>

    <!-- Balloon Letters -->
    <div class="birthday-text">
        <span>H</span>
        <span>A</span>
        <span>P</span>
        <span>P</span>
        <span>Y</span>
        <br>
        <span>B</span>
        <span>I</span>
        <span>R</span>
        <span>T</span>
        <span>H</span>
        <span>D</span>
        <span>A</span>
        <span>Y</span>
    </div>

    <!-- Stars -->
    <div class="star left">⭐</div>
    <div class="star right">⭐</div>

    <!-- Banner -->
    <div class="banner">
        <span>HAPPY</span>
        <span>BIRTHDAY</span>
    </div>

    <!-- Balloons -->
    <div class="balloons left-balloons">
        <div class="balloon black"></div>
        <div class="balloon white"></div>
        <div class="balloon gold"></div>
        <div class="balloon black"></div>
    </div>

    <div class="balloons right-balloons">
        <div class="balloon white"></div>
        <div class="balloon black"></div>
        <div class="balloon gold"></div>
        <div class="balloon white"></div>
    </div>

    <!-- Center -->
    <div class="cake-container">

        <h1>Happy Birthday Kunal ❤️</h1>

        <div class="cake">

            <!-- Candle -->
            <div class="candle">
                <div class="flame" id="flame"></div>
            </div>

            <!-- Chocolate Decoration -->
            <div class="choco-top"></div>

            <!-- Layers -->
            <div class="layer top"></div>
            <div class="layer middle"></div>
            <div class="layer bottom"></div>

            <!-- Cake Text -->
            <div class="cake-topper">
                Happy Birthday
            </div>

        </div>

        <p class="wish">
            Make a wish and blow the candle... ✨
        </p>

        <button id="blowBtn" class="cake-btn">
            🔥 Blow Candle
        </button>

        <button id="nextBtn"
                class="cake-btn"
                onclick="go('final.html')">

            Final Surprise 🎁

        </button>

    </div>

    <!-- Floor Balloons -->
    <div class="floor-balloons">

        <div class="balloon black"></div>
        <div class="balloon white"></div>
        <div class="balloon gold"></div>
        <div class="balloon black"></div>
        <div class="balloon white"></div>
        <div class="balloon gold"></div>
        <div class="balloon black"></div>
        <div class="balloon white"></div>
        <div class="balloon gold"></div>

    </div>

    <script src="CAKE.JS"></script>

</body>

</html>
